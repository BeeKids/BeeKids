{% extends "sistema/layout.html" %} {% block body %}
<style>
  :root {
    --color-fondo: #f4f6f9;
    --color-tarjeta: #ffffff;
    --color-texto: #333333;
    --color-texto-secundario: #666666;
    --color-borde: #d7dbe0;

    --color-primario: #3498db;
    --color-primario-hover: #2980b9;
    --color-secundario: #95a5a6;
    --color-secundario-hover: #7f8c8d;
    --color-enlace: #16a085;
    --color-enlace-hover: #12816e;

    --color-error: #c0392b;
    --color-error-fondo: #fdecea;
    --color-error-borde: #f5b7b1;

    --color-exito: #27ae60;
    --color-exito-fondo: #eafaf1;
    --color-exito-borde: #a3e4d7;

    --sombra: 0 6px 20px rgba(0, 0, 0, 0.12);
  }

  .login-wrapper {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    background-color: var(--color-fondo);
  }

  .login-card {
    width: 100%;
    max-width: 560px;
    background-color: var(--color-tarjeta);
    border-radius: 16px;
    box-shadow: var(--sombra);
    padding: 40px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-title {
    margin: 0 0 10px 0;
    font-size: 38px;
    font-weight: 700;
    color: var(--color-texto);
  }

  .login-subtitle {
    margin: 0;
    color: var(--color-texto-secundario);
    font-size: 15px;
    line-height: 1.5;
  }

  .mensaje {
    margin-bottom: 20px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    transition:
      opacity 0.4s ease,
      transform 0.4s ease;
  }

  .mensaje-error {
    background-color: var(--color-error-fondo);
    color: var(--color-error);
    border: 1px solid var(--color-error-borde);
  }

  .mensaje-exito {
    background-color: var(--color-exito-fondo);
    color: var(--color-exito);
    border: 1px solid var(--color-exito-borde);
  }

  .mensaje-fade {
    opacity: 0;
    transform: translateY(-8px);
  }

  .formulario-login {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .campo label {
    font-weight: 600;
    font-size: 15px;
    color: #444444;
    margin: 0;
  }

  .campo-input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid var(--color-borde);
    border-radius: 10px;
    background-color: #ffffff;
    color: var(--color-texto);
    transition:
      border-color 0.3s ease,
      box-shadow 0.3s ease;
    box-sizing: border-box;
  }

  .campo-input:focus {
    border-color: var(--color-primario);
    outline: none;
    box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
  }

  .help-text {
    color: var(--color-texto-secundario);
    font-size: 13px;
    line-height: 1.4;
    margin: 0;
  }

  .acciones-login {
    margin-top: 8px;
  }

  .boton-principal {
    width: 100%;
    min-height: 50px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    background-color: var(--color-primario);
    color: #ffffff;
    cursor: pointer;
    transition:
      background-color 0.3s ease,
      transform 0.2s ease,
      box-shadow 0.2s ease;
  }

  .boton-principal:hover {
    background-color: var(--color-primario-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.25);
  }

  .boton-principal:disabled {
    opacity: 0.75;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .acciones-secundarias {
    margin-top: 16px;
    text-align: center;
  }

  @media (max-width: 768px) {
    .login-card {
      padding: 28px 22px;
    }

    .login-title {
      font-size: 30px;
    }
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h2 class="login-title">Iniciar sesión</h2>
    </div>

    {% if mensaje %}
    <div class="mensaje mensaje-error" id="mensaje-login">{{ mensaje }}</div>
    {% endif %} {% if messages %} {% for message in messages %}
    <div
      class="mensaje {% if 'success' in message.tags %}mensaje-exito{% else %}mensaje-error{% endif %}"
    >
      {{ message }}
    </div>
    {% endfor %} {% endif %}

    <form
      action="{% url 'iniciar_sesion' %}"
      method="post"
      class="formulario-login"
      id="form-login"
      novalidate
    >
      {% csrf_token %}

      <div class="campo">
        <label for="nombre_usuario">Usuario o correo electrónico</label>
        <input
          autofocus
          class="campo-input"
          type="text"
          name="nombre_usuario"
          id="nombre_usuario"
          placeholder="Ingresa tu usuario o correo electrónico"
          autocomplete="username"
          required
        />
      </div>

      <div class="campo">
        <label for="contrasena">Contraseña</label>
        <input
          class="campo-input"
          type="password"
          name="contrasena"
          id="contrasena"
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="acciones-login">
        <button type="submit" class="boton-principal" id="submitBtn">
          Iniciar sesión
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  const formLogin = document.getElementById("form-login");
  const submitBtn = document.getElementById("submitBtn");

  if (formLogin && submitBtn) {
    formLogin.addEventListener("submit", () => {
      submitBtn.textContent = "Validando...";
      submitBtn.disabled = true;
    });
  }

  setTimeout(() => {
    document.querySelectorAll(".mensaje").forEach((msg) => {
      msg.classList.add("mensaje-fade");
      setTimeout(() => msg.remove(), 400);
    });
  }, 4000);
</script>
{% endblock %}
