{% extends 'sistema/base.html' %}

{% block title %}Seleccionar menú semanal | BeeKids{% endblock %}

{% block extra_css %}
<style>
  :root {
    --color-fondo: #f4f6f9;
    --color-tarjeta: #ffffff;
    --color-texto: #333333;
    --color-texto-secundario: #666666;
    --color-borde: #d7dbe0;
    --color-primario: #3498db;
    --color-primario-hover: #2980b9;
    --color-visualizar: #4b5563;
    --color-visualizar-hover: #374151;
    --color-gestionar: #16a085;
    --color-gestionar-hover: #12816e;
    --color-enlace: #16a085;
    --color-enlace-hover: #12816e;
    --sombra: 0 6px 20px rgba(0, 0, 0, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Poppins", sans-serif;
    background-color: var(--color-fondo);
    color: var(--color-texto);
  }

  .contenedor {
    width: 100%;
    max-width: 860px;
    margin: 30px auto;
    background-color: var(--color-tarjeta);
    padding: 40px;
    border-radius: 16px;
    box-shadow: var(--sombra);
  }

  .encabezado {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 {
    font-size: 34px;
    margin: 0 0 10px 0;
    font-weight: bold;
  }

  .descripcion {
    margin: 0;
    color: var(--color-texto-secundario);
    font-size: 15px;
    line-height: 1.5;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .seccion {
    border: 1px solid #e4e8ed;
    border-radius: 14px;
    padding: 24px;
    background-color: #ffffff;
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-weight: 600;
    font-size: 15px;
    color: #444444;
  }

  select {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid var(--color-borde);
    border-radius: 10px;
    background-color: #ffffff;
    color: var(--color-texto);
    font-family: "Poppins", sans-serif;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  select:focus {
    border-color: var(--color-primario);
    outline: none;
    box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
  }

  .acciones {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 8px;
  }

  .boton-visualizar,
  .boton-gestionar,
  .boton-secundario-outline {
    padding: 15px 24px;
    min-height: 50px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    font-family: "Poppins", sans-serif;
    border: none;
    transition:
      background-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  .boton-visualizar {
    background-color: var(--color-visualizar);
    color: #ffffff;
  }

  .boton-visualizar:hover {
    background-color: var(--color-visualizar-hover);
    box-shadow: 0 4px 12px rgba(75, 85, 99, 0.25);
  }

  .boton-gestionar {
    background-color: var(--color-gestionar);
    color: #ffffff;
  }

  .boton-gestionar:hover {
    background-color: var(--color-gestionar-hover);
    box-shadow: 0 4px 12px rgba(22, 160, 133, 0.25);
  }

  .boton-secundario-outline {
    background-color: #ffffff;
    color: var(--color-texto);
    border: 1px solid var(--color-borde);
  }

  .boton-secundario-outline:hover {
    background-color: #f8fafc;
  }

  .acciones-secundarias {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
  }

  .link-secundario {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--color-enlace);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  .link-secundario:hover {
    color: var(--color-enlace-hover);
    text-decoration: underline;
  }

  .link-secundario .icono {
    display: inline-flex;
    align-items: center;
  }

  @media (max-width: 768px) {
    .contenedor {
      padding: 24px 20px;
    }

    h1 {
      font-size: 28px;
    }

    .acciones {
      flex-direction: column;
    }

    .boton-visualizar,
    .boton-gestionar,
    .boton-secundario-outline {
      width: 100%;
    }

    .acciones-secundarias {
      justify-content: center;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="contenedor">
  <div class="encabezado">
    <h1>Seleccionar menú semanal</h1>

    <p class="descripcion">
      Elige un menú para consultarlo o administrar sus platillos.
    </p>
  </div>

  <form method="GET" action="{% url 'seleccionarMenuSemanal' %}">
    <section class="seccion">
      <div class="campo">
        <label for="menu_id">Menú semanal</label>

        <select name="menu_id" id="menu_id" required>
          <option value="">Selecciona un menú</option>

          {% for menu in menus %}
          <option value="{{ menu.id }}">{{ menu.nombre }}</option>
          {% endfor %}
        </select>
      </div>
    </section>

    <div class="acciones">
      <button type="submit" name="ver" value="true" class="boton-visualizar">
        Ver menú
      </button>

      <button
        type="submit"
        name="gestionar"
        value="true"
        class="boton-gestionar"
      >
        Gestionar menú
      </button>
    </div>
  </form>
</div>
{% endblock %}
