<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Recomendación</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        min-height: 100vh;
        padding: 30px 15px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .contenedor {
        width: 90%;
        max-width: 760px;
        background-color: #ffffff;
        padding: 50px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        font-size: 32px;
        color: #333333;
        margin: 0 0 30px 0;
        font-weight: bold;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .campo {
        display: flex;
        flex-direction: column;
      }

      label {
        font-weight: 500;
        text-align: left;
        margin-bottom: 6px;
        font-size: 16px;
        color: #555555;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        border: 1px solid #dddddd;
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
      }

      textarea {
        min-height: 120px;
        resize: none;
      }

      input[type="text"]:focus,
      textarea:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
      }

      .descripcion-campo {
        color: #666666;
        font-size: 14px;
        line-height: 1.5;
        margin: 6px 0 0 0;
      }

      .mensaje-exito {
        background-color: #eafaf1;
        color: #27ae60;
        border: 1px solid #a3e4d7;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        text-align: left;
        margin-bottom: 12px;
      }

      .error-general {
        background-color: #fdecea;
        color: #c0392b;
        border: 1px solid #f5b7b1;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        text-align: left;
        margin-bottom: 12px;
      }

      .mensaje-exito p,
      .error-general p {
        margin: 0;
      }

      .acciones {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 8px;
      }

      .boton-principal,
      .boton-cancelar {
        padding: 15px 24px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .boton-principal {
        background-color: #3498db;
        color: #ffffff;
        border: none;
      }

      .boton-principal:hover {
        background-color: #2980b9;
      }

      .boton-cancelar {
        background-color: #ffffff;
        color: #333333;
        border: 1px solid #dddddd;
      }

      .boton-cancelar:hover {
        background-color: #f8fafc;
      }

      @media (max-width: 768px) {
        .contenedor {
          padding: 30px 20px;
        }

        .acciones {
          flex-direction: column;
        }

        .boton-principal,
        .boton-cancelar {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="contenedor">
      <h1>Editar recomendación</h1>

      <form method="POST">
        {% csrf_token %} {% if messages %} {% for message in messages %}
        <div
          class="{% if message.tags == 'success' %}mensaje-exito{% else %}error-general{% endif %}"
        >
          <p>{{ message }}</p>
        </div>
        {% endfor %} {% endif %}

        <div class="campo">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            value="{{ platillo.nombre }}"
            placeholder="Ej. Ensalada de pollo"
            required
          />
        </div>

        <div class="campo">
          <label for="descripcion">Descripción</label>

          <textarea
            id="descripcion"
            name="descripcion"
            placeholder="Describe la recomendación"
            required
          >
{{ platillo.descripcion }}</textarea
          >
        </div>

        <div class="campo">
          <label for="consideraciones">Consideraciones</label>
          <textarea
            id="consideraciones"
            name="consideraciones"
            placeholder="Escribe consideraciones importantes"
          >
{{ platillo.consideraciones }}</textarea
          >
        </div>

        <div class="acciones">
          <a class="boton-cancelar" href="{% url 'gestionarRecomendaciones' %}">
            Cancelar
          </a>

          <button type="submit" class="boton-principal">Guardar cambios</button>
        </div>
      </form>
    </div>
  </body>
</html>
